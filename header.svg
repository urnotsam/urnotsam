<svg xmlns="http://www.w3.org/2000/svg" width="320" height="72" viewBox="0 0 320 72" role="img" aria-label="sam sweet">
  <style>
    .wordmark {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", "JetBrains Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 44px;
      font-weight: 500;
      letter-spacing: -0.02em;
      fill: #0d1117;
    }
    .cursor {
      animation: blink 1.05s steps(2, start) infinite;
    }
    @keyframes blink {
      to { opacity: 0; }
    }
    @media (prefers-color-scheme: dark) {
      .wordmark { fill: #f0f6fc; }
    }
  </style>
  <text class="wordmark" x="4" y="50">sam sweet<tspan class="cursor" dx="2">_</tspan></text>
</svg>
